name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore backend
        run: dotnet restore src/AiTrustCalibration.Api/AiTrustCalibration.Api.csproj
      - name: Build backend
        run: dotnet build src/AiTrustCalibration.Api/AiTrustCalibration.Api.csproj --configuration Release --no-restore

  frontend:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install frontend dependencies
        run: npm install
      - name: Build frontend
        run: npm run build
